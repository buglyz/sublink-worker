name: Deploy Worker

# Continuous deploy: push to main (or manual) updates Cloudflare Worker.
on:
  workflow_dispatch:
  repository_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Resolve KV namespace (SUBLINK_KV)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # Prefer existing titles used by this project
          LIST_JSON=$(npx wrangler kv namespace list)
          echo "$LIST_JSON" | jq empty

          KV_ID=$(echo "$LIST_JSON" | jq -r '
            .[] | select(.title == "SUBLINK_KV" or .title == "sublink-worker-SUBLINK_KV" or .title == "sublink-worker") | .id
          ' | head -n1)

          if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            echo "Creating KV namespace SUBLINK_KV..."
            CREATE_OUTPUT=$(npx wrangler kv namespace create SUBLINK_KV)
            echo "$CREATE_OUTPUT"
            KV_ID=$(echo "$CREATE_OUTPUT" | grep -oE '[0-9a-f]{32}' | head -n1)
          fi

          if [ -z "$KV_ID" ]; then
            echo "Failed to resolve KV namespace id"
            exit 1
          fi

          echo "Using SUBLINK_KV id=$KV_ID"
          echo "KV_ID=$KV_ID" >> "$GITHUB_ENV"

          # Keep wrangler.toml binding id in sync for this deploy
          python3 - <<'PY'
          import os, re
          from pathlib import Path
          kv = os.environ["KV_ID"]
          p = Path("wrangler.toml")
          text = p.read_text()
          text2, n = re.subn(
              r'(binding\s*=\s*"SUBLINK_KV"[^\n]*\n[^\n]*id\s*=\s*")[^"]*(")',
              r'\g<1>' + kv + r'\g<2>',
              text,
              count=1,
          )
          if n == 0:
              text2, n = re.subn(r'id\s*=\s*"[0-9a-f]{32}"', f'id = "{kv}"', text, count=1)
          if n == 0:
              raise SystemExit("could not patch wrangler.toml KV id")
          p.write_text(text2)
          print(p.read_text())
          PY

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            AUTH_PASSWORD
        env:
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
